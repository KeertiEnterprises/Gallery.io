<style>
/* Smooth Scroll Effect */
html {
    scroll-behavior: smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', Arial, sans-serif;
}

body{
    background:#ffffff;
    color:#333;
    overflow-x: hidden;
}

header{
    background: rgba(15, 35, 60, 0.95); 
    backdrop-filter: blur(10px);
    color:white;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.logo{
    font-size:24px;
    font-weight:700;
    letter-spacing: 1.5px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition: all 0.3s ease;
    display: inline-block;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

nav a:hover {
    color: #d4af37;
    transform: translateY(-2px);
}

.hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 6px;
    z-index: 1001;
}

.hamburger span {
    display: block;
    width: 28px;
    height: 3px;
    background-color: white;
    border-radius: 2px;
    transition: all 0.3s ease;
}

.hero{
    height:85vh;
    background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

    margin-bottom:15px;
    font-weight: 700;
    letter-spacing: -0.5px;
}

.hero-content p{

    margin-bottom:30px;
