<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
header{ background: #0f233c; color:white; padding:15px 8%; display:flex; justify-content:space-between; align-items:center; }
.logo{ font-size:24px; font-weight:700; letter-spacing: 1.5px; }
nav a{ color:white; text-decoration:none; margin-left:25px; font-size: 14px; font-weight: 500; }
nav a:hover { color: #d4af37; }
section{ padding:60px 8%; }
.section-title{ text-align:center; margin-bottom:50px; font-size:38px; color:#0f233c; font-weight: 700; position: relative; }
.section-title::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: #d4af37; }
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:30px; }
.card{ background:white; border-radius:12px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; transition: 0.3s; }
.card:hover{ transform:translateY(-8px); }
.card img{ width:100%; height:240px; object-fit:cover; }
.card h3{ padding:20px; font-size: 18px; color: #0f233c; font-weight: 600; }
footer{ background: #0f233c; color:white; text-align:center; padding: 30px; font-size: 14px; margin-top: 40px;}
</style>
</head>
